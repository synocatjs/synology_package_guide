<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Document</title>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
        <meta name="description" content="Description" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
        />
        <link
            rel="stylesheet"
            href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
        />
    </head>
    <body>
        <div id="app"></div>
        <script>
            window.$docsify = {
                // 基础配置
                name: "群晖套件开发", // 侧边栏顶部的网站名称
                repo: "", // 右上角的GitHub链接

                // 侧边栏与导航栏配置
                loadSidebar: true, // 1. 开启侧边栏 (关键!)
                loadNavbar: true, // (可选) 开启顶部导航栏
                subMaxLevel: 2, // (可选) 侧边栏自动显示当前页面的2级标题目录

                // 其他常用配置
                coverpage: false, // (可选) 是否显示封面
                auto2top: true, // 切换页面时自动滚动到顶部
                mergeNavbar: true, // 小屏设备将导航栏合并到侧边栏
                themeColor: "#42b983", // 设置主题色
            };
        </script>
        <!-- Docsify v4 -->
        <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    </body>
</html>
